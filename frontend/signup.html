<!DOCTYPE html>
<html lang="en">
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="/static/css.css">
</head>
<body>

    <div class="navbar">
        <h1>DreamHomes</h1>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/static/seller.html">Seller</a></li>
            <li><a href="/static/login.html">Login</a></li>
            <li><a href="/static/signup.html">Signup</a></li>
        </ul>
    </div>

    <div class="form-container">
        <h2>Create Account</h2>

        <div class="form-group">
            <label>Full Name</label>
            <input id="name" type="text" placeholder="Enter Name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="Enter Email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input id="password" type="password" placeholder="Enter Password">
        </div>
        <p id="msg" style="color:red;text-align:center;margin-bottom:10px;"></p>
        <button class="submit-btn" onclick="signup()">Signup</button>
        <div style="margin-top:10px;text-align:center;">Already have an account? <a href="/static/login.html">Login</a></div>
    </div>

    <script>
        async function signup() {
            const res = await fetch("/auth/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name:     document.getElementById("name").value,
                    email:    document.getElementById("email").value,
                    password: document.getElementById("password").value
                })
            });
            const data = await res.json();
            if (res.ok) {
                alert("Account created! Please login.");
                window.location.href = "/static/login.html";
            } else {
                document.getElementById("msg").textContent = data.detail;
            }
        }
    </script>
</body>
</html>
