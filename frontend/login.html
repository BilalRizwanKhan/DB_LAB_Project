<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/css.css">
</head>
<body>

    <div class="navbar">
        <h1>DreamHomes</h1>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/static/seller.html">Seller</a></li>
            <li><a href="/static/login.html">Login</a></li>
            <li><a href="/static/signup.html">Signup</a></li>
        </ul>
    </div>

    <div class="form-container">
        <h2>Login</h2>

        <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="Enter Email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input id="password" type="password" placeholder="Enter Password">
        </div>
        <p id="msg" style="color:red;text-align:center;margin-bottom:10px;"></p>
        <button class="submit-btn" onclick="login()">Login</button>
        <div class="log">Don't have an account? <a href="/static/signup.html">Sign Up</a></div>
    </div>

    <script>
    async function login() {
        const res = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                email:    document.getElementById("email").value,
                password: document.getElementById("password").value
            })
        });
        const data = await res.json();
        console.log("Status:", res.status);
        console.log("Response:", data);
        if (res.ok) {
            localStorage.setItem("token", data.access_token);
            localStorage.setItem("username", data.name);
            window.location.href = "/static/home.html";
        } else {
            document.getElementById("msg").textContent = data.detail;
        }
    }
</script>
</body>
</html>
