version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dreamhomes-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dreamhomes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: dreamhomes-web
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dreamhomes
      SECRET_KEY: ${SECRET_KEY:-please-change-this-secret-key-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      EMAIL_HOST: ${EMAIL_HOST:-sandbox.smtp.mailtrap.io}
      EMAIL_PORT: ${EMAIL_PORT:-2525}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-DreamHomes <noreply@dreamhomes.com>}
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
